[project]
name = "risk-ml"
version = "0.0.1"
description = "Python training skeleton for Legally Distinct Global Domination"
readme = "README.md"
requires-python = ">=3.11"
dependencies = ["numpy", "torch"]

[project.scripts]
risk-ml-train = "risk_ml.train:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/risk_ml"]
